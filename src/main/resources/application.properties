spring.application.name=AI-Log-Debugger
server.port=8080

spring.config.import=optional:classpath:application-secrets.properties

# Azure OpenAI
azure.openai.endpoint=${AZURE_OPENAI_ENDPOINT}
azure.openai.api-key=${AZURE_OPENAI_KEY}
azure.openai.embedding-deployment=text-embedding-ada-002
azure.openai.chat-deployment=gpt-4o-mini

# Azure AI Search
azure.search.endpoint=${AZURE_SEARCH_ENDPOINT}
azure.search.api-key=${AZURE_SEARCH_KEY}
azure.search.index-name=log-vectors

# Azure Cache for Redis (SSL on port 6380)
spring.data.redis.host=${AZURE_REDIS_HOST}
spring.data.redis.port=6380
spring.data.redis.password=${AZURE_REDIS_PASSWORD}
spring.data.redis.ssl.enabled=true


